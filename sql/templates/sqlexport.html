{% extends "base.html" %}

{% block content %}
        <div class="col-md-1">
            <div class="panel panel-default">
                <div class="panel-heading form-inline">
                    选择环境
                </div>
                <div class="form-group">
                    <input hidden="true" value="" id="env">
                    {% for exportEnv in exportEnv_list %}
                        <div style="text-align:center;"><a href="javascript:;" onclick="selectEnv(this.id)" id="{{ exportEnv.id }}"><span>{{ exportEnv.name }}</span></a></div>
                    {% endfor %}
                    <!--<select id="env2" class="form-control selectpicker">
                        <option value="" selected="selected">导出环境</option>
                        {% for exportEnv in exportEnv_list %}
                            <option value="{{ exportEnv.id }}"></option>
                        {% endfor %}
                    </select>-->
                </div>
                <div class="form-group ">
                    <button id="btn_add" type="button" class="btn btn-default" data-toggle="modal" data-target="#add_env">
                        <span class="glyphicon glyphicon-plus" aria-hidden="true"></span>
                        新增环境
                    </button>
                </div>
            </div>

        </div>
        <div class="col-md-11">
            <div class="panel panel-default">
                <div class="panel-heading form-inline">
                    未导出脚本
                </div>
                <!-- 自定义操作按钮-->
                <div id="toolbar" class="form-inline pull-left">
                    <div class="form-group">
                        <select id="navStatus" class="form-control selectpicker">
                            <option value="" selected="selected">状态</option>
                            {% for status, status_display in status_list %}
                                <option value="{{ status }}">{{ status_display }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <select id="instance_id" class="form-control selectpicker"
                                data-live-search="true">
                            <option value="" selected="selected">实例</option>
                            {% for ins in instance %}
                                <option value="{{ ins.id }}">{{ ins.instance_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <select id="group_id" class="form-control selectpicker"
                                data-live-search="true">
                            <option value="" selected="selected">组</option>
                            {% for rgp in resource_group %}
                                <option value="{{ rgp.group_id }}">{{ rgp.group_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class='form-group'>
                        <div id="reservation" class="form-control"
                             style="background: #fff; cursor: pointer; padding: 5px 10px; border: 1px solid #ccc; width: 100%">
                            <i class="fa fa-calendar"></i>&nbsp;
                            <span></span> <i class="fa fa-caret-down"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <button id="btn_notexport" type="button" class="btn btn-default" data-toggle="modal" data-target="#notexport">
                            <span class="glyphicon glyphicon-export" aria-hidden="true"></span>
                            导出SQL
                        </button>
                    </div>
                </div>
                <!-- 审核列表的表格-->
                <div class="table-responsive">
                    <table id="notexport-list" data-toggle="table" class="table table-striped table-hover"
                       style="table-layout:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></table>
                    <footer id="check_notexport_num">已勾选0条</footer>
                </div>
            </div>

            <div class="panel panel-default">
                <div class="panel-heading form-inline">
                    已导出脚本
                </div>
                <div id="toolbar2" class="form-inline pull-left">
                    <div class="form-group">
                        <button id="btn_exported" type="button" class="btn btn-default" data-toggle="modal" data-target="#exported">
                            <span class="glyphicon glyphicon-export" aria-hidden="true"></span>
                            导出SQL
                        </button>
                    </div>
                </div>
                <div class="table-responsive">
                    <table id="exported-list" data-toggle="table" class="table table-striped table-hover"
                           style="table-layout:inherit;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></table>
                    <footer id="check_exported_num">已勾选0条</footer>
                </div>
            </div>
        </div>

    <div class="modal fade" id="notexport" tabindex="-1" role="dialog" aria-labelledby="notexportLabel">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
                            aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title" id="notexportLabel">导出确认</h4>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <input type="text" autocomplete="off" class="form-control" id="versionName" placeholder="版本号">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-success" onclick="notexport()">确定</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="exported" tabindex="-1" role="dialog" aria-labelledby="exportedLabel">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
                            aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title" id="exportedLabel">导出确认</h4>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <input type="text" autocomplete="off" class="form-control" id="versionName2" placeholder="版本号">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-success" onclick="exported()">确定</button>
                </div>
            </div>
        </div>
    </div>
    <!-- 申请权限的模态框-->
    <div class="modal fade" id="add_env" tabindex="-1" role="dialog" aria-labelledby="myModalLabel">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span
                            aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title" id="myModalLabel">新增导出环境</h4>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <input type="text" autocomplete="off" class="form-control" id="name" placeholder="名称">
                    </div>
                    <div class="form-group">
                        <input type="text" autocomplete="off" class="form-control" id="remarks" placeholder="描述">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-success" onclick="addCommit()">提交新增</button>
                </div>
            </div>
        </div>
    </div>


{% endblock content %}
{% block js %}
    {% load static %}
    <link href="{% static 'daterangepicker/css/daterangepicker.css' %}" rel="stylesheet" type="text/css"/>
    <script src="{% static 'daterangepicker/js/moment.min.js' %}"></script>
    <script src="{% static 'daterangepicker/js/daterangepicker.js' %}"></script>
    <script src="{% static 'bootstrap-table/js/bootstrap-table-export.min.js' %}"></script>
    <script src="{% static 'bootstrap-table/js/tableExport.min.js' %}"></script>
    <script>

        // 初始化时间控件
        $(function () {
            let start = moment().subtract(89, 'days');
            let end = moment();
            // 暂时先不放开查全部
           // let start = null;
           // let end = null;

            function cb(start, end) {
                if (start !=null && end !=null && start.isValid() && end.isValid()) {
                    $('#reservation span').html(start.format('YYYY-MM-DD') + ' - ' + end.format('YYYY-MM-DD'));
                } else {
                    $('#reservation span').html('全部数据');
                }
            }

            $('#reservation').daterangepicker({
                startDate: start,
                endDate: end,
                showDropdowns: true,
                locale: {
                    format: "YYYY-MM-DD",// 显示格式
                    separator: " / ",// 两个日期之间的分割线
                    // 中文化
                    applyLabel: "确定",
                    cancelLabel: "取消",
                    fromLabel: "开始",
                    toLabel: "结束",
                    customRangeLabel: "自定义",
                    daysOfWeek: ["日", "一", "二", "三", "四", "五", "六"],
                    monthNames: ["一月", "二月", "三月", "四月", "五月", "六", "七月", "八月", "九月", "十月", "十一月", "十二月"],
                    firstDay: 1
                },
                ranges: {
                    "全部": [null, null],
                    "今日": [moment().startOf('day'), moment()],
                    "昨日": [moment().subtract('days', 1).startOf('day'), moment().subtract('days', 1).endOf('day')],
                    "最近7日": [moment().subtract('days', 6), moment()],
                    "最近30日": [moment().subtract('days', 29), moment()],
                    "本月": [moment().startOf("month"), moment().endOf("month")],
                    "上个月": [moment().subtract(1, "month").startOf("month"), moment().subtract(1, "month").endOf("month")]
                }
            }, cb).on('apply.daterangepicker', function (ev, picker) {
                notexport_workflow_list()
                export_workflow_list()
            });
            cb(start, end);
        });

    </script>
    <script>
        function selectEnv(id){
            $('#env').val(id)
            notexport_workflow_list();
            export_workflow_list();
        }
        //获取SQL工单列表
        function notexport_workflow_list() {
            //采取异步请求
            //初始化table
            $('#notexport-list').bootstrapTable('destroy').bootstrapTable({
                escape: true,
                method: 'post',
                contentType: "application/x-www-form-urlencoded",
                url: "/archery/export/notexport_workflow_list/",
                height: 499,
                striped: true,                      //是否显示行间隔色
                cache: false,                       //是否使用缓存，默认为true，所以一般情况下需要设置一下这个属性（*）
                pagination: false,                   //是否显示分页（*）
                sortable: true,                     //是否启用排序
                sortOrder: "asc",                   //排序方式
                sidePagination: "server",           //分页方式：client客户端分页，server服务端分页（*）
                pageNumber: 1,                      //初始化加载第一页，默认第一页,并记录
                pageSize: 14,                     //每页的记录行数（*）
                pageList: [20, 30, 50, 100],       //可供选择的每页的行数（*）
                exportOptions: {
                    fileName: 'sqlworkflow'  //文件名称设置
                },
                search: true,                      //是否显示表格搜索
                strictSearch: false,                //是否全匹配搜索
                showColumns: false,                  //是否显示所有的列（选择显示的列）
                showRefresh: true,                  //是否显示刷新按钮
                minimumCountColumns: 2,             //最少允许的列数
                clickToSelect: true,                //是否启用点击选中行
                uniqueId: "id",                     //每一行的唯一标识，一般为主键列
                showToggle: false,                   //是否显示详细视图和列表视图的切换按钮
                cardView: false,                    //是否显示详细视图
                detailView: false,                  //是否显示父子表
                locale: 'zh-CN',                    //本地化
                toolbar: "#toolbar",               //指明自定义的toolbar
                queryParamsType: 'limit',
                //请求服务数据时所传参数
                queryParams:
                    function (params) {
                        let start_date = $("#reservation").data('daterangepicker').startDate;
                        let end_date = $("#reservation").data('daterangepicker').endDate;
                        if (start_date.isValid() && end_date.isValid()) {
                            start_date = start_date.format('YYYY-MM-DD');
                            end_date = end_date.format('YYYY-MM-DD')
                        } else {
                            start_date = '';
                            end_date = ''
                        }
                        return {
                            limit: params.limit,
                            offset: params.offset,
                            env: $("#env").val(),
                            navStatus: $("#navStatus").val(),
                            instance_id: $("#instance_id").val(),
                            group_id: $("#group_id").val(),
                            start_date: start_date,
                            end_date: end_date,
                            search: params.search
                        }
                    },
                columns: [{
                    checkbox: true
                },{
                    title: '工单名称',
                    field: 'workflow_name',
                    formatter: function (value, row, index) {
                        var span = document.createElement('span');
                        span.setAttribute('title', value);
                        span.innerHTML = "<a href=\"/archery/detail/" + row.id + "/\">" + value + "</a>";
                        return span.outerHTML;
                    }
                }, {
                    title: '工单完整名称',
                    field: 'workflow_name',
                    visible: false // 默认不显示
                }, {
                    title: '类型',
                    field: 'syntax_type',
                    formatter: function (value, row, index) {
                        if (value === 0) {
                            return '其他'
                        } else if (value === 1) {
                            return 'DDL'
                        } else if (value === 2) {
                            return 'DML'
                        }
                    }
                }, {
                    title: '发起人',
                    field: 'engineer_display'
                }, {
                    title: '工单状态',
                    field: 'status',
                    formatter: function (value, row, index) {
                        return sqlworkflowStatus_formatter(value)
                    }
                },  {
                    title: '发起时间',
                    field: 'create_time'
                }, {
                    title: '数据库',
                    field: 'db_name'
                }, {
                    title: '组',
                    field: 'group_name'
                }],
                onLoadSuccess: function () {
                },
                onLoadError: function () {
                    alert("数据加载失败！请检查接口返回信息和错误日志！");
                },
                onSearch: function (e) {
                    //传搜索参数给服务器
                    queryParams(e)
                },
                onCheck: function (row,$element) {
                    checkNotExportNum();
                },
                onUncheck: function (row,$element) {
                    checkNotExportNum();
                },
                onCheckAll: function (row) {
                    checkNotExportNum();
                },
                onUncheckAll: function (row) {
                    checkNotExportNum();
                },
                responseHandler: function (res) {
                    //在ajax获取到数据，渲染表格之前，修改数据源
                    return res;
                }
            });

        }

        function checkNotExportNum() {
            var row = $('#notexport-list').bootstrapTable('getSelections');
            var str = '已勾选'+row.length+'条';
            $('#check_notexport_num').text(str)

        }

        function export_workflow_list() {

            //初始化table
            $('#exported-list').bootstrapTable('destroy').bootstrapTable({

                pageSize: 14,                     //每页的记录行数（*）

                showExport: false,                   //是否显示导出按钮
                exportOptions: {
                    fileName: 'sqlworkflow'  //文件名称设置
                },
                search: true,                      //是否显示表格搜索
                strictSearch: false,                //是否全匹配搜索
                showColumns: false,                  //是否显示所有的列（选择显示的列）
                showRefresh: false,                  //是否显示刷新按钮
                minimumCountColumns: 2,             //最少允许的列数
                clickToSelect: true,                //是否启用点击选中行
                uniqueId: "id",                     //每一行的唯一标识，一般为主键列
                showToggle: false,                   //是否显示详细视图和列表视图的切换按钮
                cardView: false,                    //是否显示详细视图
                detailView: false,                  //是否显示父子表
                locale: 'zh-CN',                    //本地化
                toolbar: "#toolbar2",               //指明自定义的toolbar
                queryParamsType: 'limit',
                //请求服务数据时所传参数
                queryParams:
                    function (params) {
                        let start_date = $("#reservation").data('daterangepicker').startDate;
                        let end_date = $("#reservation").data('daterangepicker').endDate;
                        if (start_date.isValid() && end_date.isValid()) {
                            start_date = start_date.format('YYYY-MM-DD');

                        }
                        return {

                            start_date: start_date,
                            end_date: end_date,
                            search: params.search
                        }
                    },
                columns: [{
                    checkbox: true
                },{
                    title: '工单名称',
                    field: 'workflow_name',
                    width: 1000,
                    formatter: function (value, row, index) {
                        var span = document.createElement('span');
                        span.setAttribute('title', value);
                        span.innerHTML = "<a href=\"/archery/detail/" + row.id + "/\">" + value + "</a>";
                        return span.outerHTML;
                    }
                }, {
                    title: '工单完整名称',
                    field: 'workflow_name',
                    visible: false // 默认不显示
                }, {
                    title: '类型',
                    field: 'syntax_type',
                    formatter: function (value, row, index) {
                        if (value === 0) {
                            return '其他'
                        } else if (value === 1) {
                            return 'DDL'
                        } else if (value === 2) {
                            return 'DML'
                        }
                    }
                }, {
                    title: '发起人',
                    field: 'engineer_display'
                }, {
                    title: '工单状态',
                    field: 'status',
                    formatter: function (value, row, index) {
                        return sqlworkflowStatus_formatter(value)
                    }
                }, {
                    title: '发起时间',
                    field: 'create_time'
                },{
                    title: '数据库',
                    field: 'db_name'
                }, {
                    title: '组',
                    field: 'group_name'
                }],
                onLoadSuccess: function () {
                },
                onLoadError: function () {
                    alert("数据加载失败！请检查接口返回信息和错误日志！");
                },
                onSearch: function (e) {
                    //传搜索参数给服务器
                    queryParams(e)
                },
                onCheck: function (row,$element) {
                    checkExportedNum();
                },
                onUncheck: function (row,$element) {
                    checkExportedNum();
                },
                onCheckAll: function (row) {
                    checkExportedNum();
                },
                onUncheckAll: function (row) {
                    checkExportedNum();
                },
                responseHandler: function (res) {
                    //在ajax获取到数据，渲染表格之前，修改数据源
                    return res;
                }
            });

        }

        function checkExportedNum() {
            var row = $('#exported-list').bootstrapTable('getSelections');
            var str = '已勾选'+row.length+'条';
            $('#check_exported_num').text(str)

        }

        //筛选变动自动刷新
        $("#env").change(function () {
            notexport_workflow_list();
            export_workflow_list();
        });

        //筛选变动自动刷新
        $("#navStatus").change(function () {
            notexport_workflow_list();
            export_workflow_list();
        });

        $("#instance_id").change(function () {
            notexport_workflow_list();
            export_workflow_list();
        });

        $("#group_id").change(function () {
            notexport_workflow_list();
            export_workflow_list();
        });

        //初始化数据
        $(document).ready(function () {
            notexport_workflow_list();
            export_workflow_list();
        });

        function addCommit () {
            var name = $('#name').val();
            var remarks = $('#remarks').val();
            //禁用按钮
            $('button[type=button]').addClass('disabled');
            $('button[type=button]').prop('disabled', true);
            //提交请求
            $.ajax({
                type: "post",
                url: "/archery/export/commit/",
                dataType: "json",
                data: {
                    name: name,
                    remarks: remarks
                },
                complete: function () {
                    $('button[type=button]').removeClass('disabled');
                    $('button[type=button]').prop('disabled', false);
                },
                success: function (data) {
                    if (data.status === 0) {
                        $('#apply').modal('hide');
                        location.href = '/archery/sqlexport/'
                    } else {
                        alert(data.msg)
                    }
                },
                error: function (XMLHttpRequest, textStatus, errorThrown) {
                    alert(errorThrown);
                }
            });
        }

        function exported () {
            var row = $('#exported-list').bootstrapTable('getSelections');
            var versionName2 = $('#versionName2').val();
            exportSql (row,false,versionName2);
        }

        function notexport () {
            var row = $('#notexport-list').bootstrapTable('getSelections');
            var versionName = $('#versionName').val();
            exportSql (row,true,versionName);
        }

        function exportSql (row,firstExport,versionName) {
            var ids = []
            for (let i = 0 ; i < row.length; i++){
                ids.push(row[i].id)
            }
            if (versionName === null || versionName.trim() === "") {
                alert("版本号不能为空！");
                return result = false;
            }
            if (ids.length>0) {
                $.ajax({
                    type: "post",
                    url: "/archery/export/export/",
                    dataType: "json",
                    data: {
                        ids: JSON.stringify(ids),
                        versionName: versionName,
                        env_id: $("#env").val(),
                        firstExport: firstExport
                    },
                    complete: function () {
                        $('button[type=button]').removeClass('disabled');
                        $('button[type=button]').prop('disabled', false);
                    },
                    success: function (data) {
                        if (data.status === 0) {
                            alert(data.msg)
                            $('#apply').modal('hide');
                            location.href = '/archery/sqlexport/'
                        } else {
                            alert(data.msg)
                        }
                    },
                    error: function (XMLHttpRequest, textStatus, errorThrown) {
                        alert(errorThrown);
                    }
                });
            } else {
                alert('请勾选需要导出的工单！')
            }
        }

    </script>
{% endblock %}
